name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Capacitor
        run: npm install

      - name: Add Android platform
        run: npx cap add android || echo "Already added"

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Generate release keystore
        run: |
          keytool -genkey -v \
            -keystore android/app/release.keystore \
            -alias laperla \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass laperla123 -keypass laperla123 \
            -dname "CN=La Perla, OU=POS, O=Restaurant, L=Tunis, S=Tunis, C=TN"

      - name: Build APK (debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LaPerla-POS-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Show download link
        run: echo "✅ APK disponible dans les Artifacts de ce workflow"

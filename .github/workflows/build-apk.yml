name: Build Android APK

on:
  push:
    branches: [ main ]
    paths:
      - 'angular-app/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify required secrets are configured
        run: |
          if [ -z "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "::error::Le secret ANDROID_KEYSTORE_BASE64 n'est pas configuré."
            echo "Va sur Settings > Secrets and variables > Actions et ajoute-le."
            exit 1
          fi
          if [ -z "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" ]; then
            echo "::error::Le secret ANDROID_KEYSTORE_PASSWORD n'est pas configuré."
            echo "Va sur Settings > Secrets and variables > Actions et ajoute-le."
            exit 1
          fi
          echo "✅ Secrets présents, poursuite du build"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install npm dependencies
        working-directory: angular-app
        run: npm install

      - name: Build Angular (production)
        working-directory: angular-app
        run: npm run build

      - name: Sync Capacitor (copy web build into native project)
        working-directory: angular-app
        run: npx cap sync android

      # ── Signature stable : même keystore à chaque build ────────────
      # Le keystore est stocké en secret GitHub (base64), jamais dans le repo.
      # Sans ça, Android refuse d'installer une mise à jour par-dessus
      # une version précédente signée différemment.
      - name: Decode release keystore
        working-directory: angular-app/android
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          printf '%s' "$KEYSTORE_B64" | tr -d '[:space:]' | base64 -d > app/release.keystore
          wc -c app/release.keystore

      # ── Numéro de version auto-incrémenté ───────────────────────────
      # Utilise le numéro de run GitHub (toujours croissant) comme
      # versionCode : garantit que chaque nouvel APK est reconnu par
      # Android comme une mise à jour, jamais comme un doublon.
      - name: Build signed release APK
        working-directory: angular-app/android
        env:
          KEYSTORE_PATH: release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: laperla
          KEY_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon \
            -PappVersionCode=${{ github.run_number }} \
            -PappVersionName="1.0.${{ github.run_number }}"

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: LaPerla-POS-APK-v1.0.${{ github.run_number }}
          path: angular-app/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 90

      - name: Summary
        run: |
          echo "✅ Build terminé — version 1.0.${{ github.run_number }}"
          echo "📦 Télécharger : onglet Actions → ce run → Artifacts → LaPerla-POS-APK-v1.0.${{ github.run_number }}"
          echo "📲 Installer cet APK par-dessus une version précédente met à jour l'app sans perte de données"

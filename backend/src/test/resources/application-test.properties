# Configuration H2 en mémoire pour les tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.liquibase.enabled=false

# JWT pour tests
jwt.secret=testSecretKeyForJWTTokenGenerationInTests1234567890ABCDEF
jwt.access-expiration-ms=3600000
jwt.refresh-expiration-ms=86400000

# Désactiver WebSocket
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.websocket.servlet.WebSocketServletAutoConfiguration

server.port=0

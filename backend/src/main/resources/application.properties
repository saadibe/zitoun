# ════════════════════════════════════
#  Zitoun POS — Configuration
#  Mode DEV : H2 in-memory (sans PostgreSQL)
# ════════════════════════════════════
server.port=${PORT:8080}
spring.application.name=zitoun-pos

# H2 (DEV — aucune installation requise)
spring.datasource.url=jdbc:h2:mem:zitoundev;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# CORS
cors.allowed-origins=${FRONTEND_URL:*}

# Erreurs
server.error.include-message=never
server.error.include-stacktrace=never

spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA — laisser Liquibase gérer le schéma
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.h2.console.enabled=false
spring.jpa.show-sql=false

# Liquibase
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml

# CORS
cors.allowed-origins=${FRONTEND_URL:https://zitoun-pos-frontend.onrender.com}

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=28800000

# App base URL
app.base-url=${APP_BASE_URL:https://zitoun-pos-api.onrender.com}
frontend.url=${FRONTEND_URL:https://zitoun-pos-frontend.onrender.com}

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=28800000

# OAuth2 — Google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,email,profile
spring.security.oauth2.client.registration.google.redirect-uri=${app.base-url}/api/auth/oauth2/callback/google

# OAuth2 — GitHub
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET}
spring.security.oauth2.client.registration.github.scope=read:user,user:email
spring.security.oauth2.client.registration.github.redirect-uri=${app.base-url}/api/auth/oauth2/callback/github

#  Render lit ce fichier → crée tout automatiquement
# ════════════════════════════════════════════
 
services:
 
  # ── API Spring Boot ──────────────────────
  - type: web
    name: zitoun-pos-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    plan: free
    region: frankfurt
    healthCheckPath: /api/menu
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DATABASE_URL
        sync: false       # ← coller la JDBC URL Neon ici
      - key: FRONTEND_URL
        value: https://zitoun-pos-frontend.onrender.com
 
  # ── Frontend Angular ─────────────────────
  - type: web
    name: zitoun-pos-frontend
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build:prod
    staticPublishPath: ./frontend/dist/zitoun-pos/browser
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

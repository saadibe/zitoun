services:
  # ── Backend Spring Boot ───────────────────────
  - type: web
    name: zitoun-pos-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    plan: free
    region: frankfurt
    healthCheckPath: /api/menu
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_URL
        value: https://zitoun-pos-angular.onrender.com
      - key: JWT_SECRET
        sync: false

  # ── Frontend Angular 19 ───────────────────────
  - type: web
    name: zitoun-pos-angular
    runtime: node
    region: frankfurt
    rootDir: ./angular-app
    buildCommand: npm install && npx ng build --configuration=production
    startCommand: npx serve dist/zitoun-angular/browser -p $PORT --no-clipboard
    plan: free
    envVars:
      - key: NODE_ENV
        value: production

  # ── Frontend HTML/JS (legacy) ─────────────────
  - type: web
    name: zitoun-pos-frontend
    runtime: static
    staticPublishPath: ./frontend-static
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

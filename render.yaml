services:
  - type: web
    name: zitoun-pos-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    plan: free
    region: frankfurt
    healthCheckPath: /api/menu
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_URL
        value: https://zitoun-pos-angular.onrender.com
      - key: JWT_SECRET
        sync: false

  - type: web
    name: zitoun-pos-angular
    runtime: node
    region: frankfurt
    rootDir: ./angular-app
    buildCommand: npm install --legacy-peer-deps && node_modules/.bin/ng build --configuration=production
    startCommand: node server.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_OPTIONS
        value: "--max-old-space-size=1024"

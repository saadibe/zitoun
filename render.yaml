services:
  - type: web
    name: zitoun-pos-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    plan: free
    region: frankfurt
    healthCheckPath: /api/menu
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_URL
        value: https://zitoun-pos-frontend.onrender.com
      - key: JWT_SECRET
        sync: false

  - type: web
    name: zitoun-pos-frontend
    runtime: static
    staticPublishPath: ./frontend-static
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
